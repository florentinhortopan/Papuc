project_id = "papuc"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["papuc://*"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[functions]
verify_jwt = true

[functions.scout-project]
verify_jwt = true

[functions.parse-project-goals]
verify_jwt = true

[functions.rank-deals]
verify_jwt = true

[functions.comparables]
verify_jwt = true

[functions.nightly-scout]
verify_jwt = false

[edge_runtime]
policy = "oneshot"
inspector_port = 8083
